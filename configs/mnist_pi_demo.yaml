# 真机演示: 1 台树莓派作为 client, Mac 作为 server
# (因为只有 1 台 Pi, 设 num_clients=1 即可退化成单 client FedAvg)
exp_name: mnist_pi_demo
dataset: mnist
model: mnist_cnn
num_classes: 10

num_clients: 1
num_rounds: 3
local_epochs: 1
batch_size: 32
learning_rate: 0.01

partition:
  strategy: iid

# server 监听所有网卡; client 端用 --server_address 覆盖为 Mac 的 IP
server_address: "0.0.0.0:8081"
seed: 42
device: cpu

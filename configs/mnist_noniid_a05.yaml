# ============================================================================
# E3 Non-IID 中等实验: alpha=0.5
# 用途: 数据分布部分不一致 — 每个 client 大部分类别都有, 但比例倾斜.
#       比联邦学习论文里最常用的对比点之一.
# 预期: 准确率介于 E2(α=0.1) 和 E4(α=1.0) 之间, 收敛速度中等
# ============================================================================

exp_name: mnist_noniid_a05
dataset: mnist
model: mnist_cnn
num_classes: 10

num_clients: 2
num_rounds: 15
local_epochs: 1
batch_size: 32
learning_rate: 0.01

partition:
  strategy: dirichlet
  alpha: 0.5                   # ⭐ 中等浓度, 数据有偏但仍覆盖大部分类

server_address: "0.0.0.0:8081"
seed: 42
device: cpu
